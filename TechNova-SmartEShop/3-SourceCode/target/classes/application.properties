# ===================================================================
# SERVER CONFIGURATION
# ===================================================================
server.port=8080

# ===================================================================
# DATABASE CONFIGURATION (MySQL)
# ===================================================================
# Cấu hình kết nối MySQL. Tự động tạo database 'technova_db' nếu chưa có.
spring.datasource.url=jdbc:mysql://localhost:3306/technova_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===================================================================
# JPA / HIBERNATE CONFIGURATION
# ===================================================================
# Tự động cập nhật cấu trúc bảng dựa trên JPA Entities
spring.jpa.hibernate.ddl-auto=update
# Hiển thị các câu lệnh SQL được sinh ra bởi Hibernate trên Console
spring.jpa.show-sql=true
# Định dạng câu lệnh SQL cho dễ đọc
spring.jpa.properties.hibernate.format_sql=true
# Sử dụng dialect phù hợp với MySQL 8
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===================================================================
# JWT SECURITY CONFIGURATION
# ===================================================================
# Khóa bí mật JWT (Base64-encoded, tối thiểu 256-bit để đảm bảo an toàn cho HS256)
# Chuỗi raw: "technova_smart_eshop_secret_key_2026_antigravity_spring_boot_security" (đã encode base64)
technova.jwt.secret=dGVjaG5vdmFfc21hcnRfZXNob3Bfc2VjcmV0X2tleV8yMDI2X2FudGlncmF2aXR5X3NwcmluZ19ib290X3NlY3VyaXR5
# Thời gian hết hạn của JWT Token (24 giờ = 86400000 ms)
technova.jwt.expiration=86400000

# ===================================================================
# SWAGGER & OPENAPI CONFIGURATION
# ===================================================================
# Enable Swagger UI và chỉ định đường dẫn truy cập (mặc định: http://localhost:8080/swagger-ui/index.html)
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
